ai_usage_summary: |
  Used AI assistance for architecture discussion, code review, and implementation support.
  The ranking pipeline, feature engineering, evaluation workflow, and local validation
  were implemented and tested in this repository.

methodology_summary: |
  Recruiter-aware candidate ranking system for the Redrob Senior AI Engineer JD.
  The pipeline uses structured JD requirements, lexical shortlist retrieval, and a
  weighted scoring model across fit, availability, trust, and growth. Fit emphasizes
  real career-history evidence for retrieval, ranking, recommendation, embeddings,
  vector infra, and evaluation work. Additional defenses penalize AI keyword inflation,
  consulting-only histories, suspicious profile signals, and likely honeypots.
  The ranking step runs locally on CPU and produces factual reasoning for the top 100.

